    max_subagent_llm_calls: 30
    max_subagent_runtime_seconds: 900
  CriticAgent:
    max_internal_dag_nodes: 30
    max_subagent_tool_calls: 30
    max_subagent_llm_calls: 30
    max_subagent_runtime_seconds: 900
  WriteAgent:
    max_internal_dag_nodes: 30
    max_subagent_tool_calls: 30
    max_subagent_llm_calls: 30
    max_subagent_runtime_seconds: 900

completion_guards_by_role:
  SurveyAgent:
    required_tool_calls_before_final:
      - write_report
  DesignAgent:
    required_tool_calls_before_final:
      - write_report
  ExecAgent:
    required_tool_calls_before_final:
      - write_jsonl
      - write_report
    max_non_required_tool_calls_before_required_outputs: 18
  CriticAgent:
    required_tool_calls_before_final:
      - write_report
  WriteAgent:
    required_tool_calls_before_final:
      - write_jsonl
      - write_report
    max_non_required_tool_calls_before_required_outputs: 12

