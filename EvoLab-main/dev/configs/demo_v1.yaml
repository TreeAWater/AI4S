    "inputs/biology_component_article.md": "# Engineered Translation System\n\n## Abstract\nWe engineered a synthetic translation control system in E. coli. Component pTet drives sfGFP expression from plasmid pEVL-101. A B0034 ribosome binding site improves translation initiation. The construct includes terminator B0015. Supplementary Table 1 reports pTet, B0034, sfGFP, and B0015 as validated components with sequence evidence.\n\n## Methods\nComponents were cloned into pEVL-101 and sequence-verified. Fluorescence increased 3.2-fold after induction.\n\n## Supplementary Table 1\ncomponent_name,component_type,sequence,evidence_source\npTet,promoter,TTGACATCCCTATCAGTGATAGAGATCTCC,main text abstract\nB0034,RBS,AAAGAGGAGAAA,supplementary table\nsfGFP,CDS,ATGAGTAAAGGAGAAGAACTTTTC,methods\nB0015,terminator,CCAGGCATCAAATAAAACGAAAGGCTCAGTCGAAAGACTGGGCCTTTCGTTTTAT,supplementary table\n",
