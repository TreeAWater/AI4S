lab_root: lab/demo_v0
task_id: demo-v0
task: Compare catalyst A and catalyst B using available memory and give a concise recommendation.
files:
  inputs/catalyst_evidence.txt: |
    Catalyst A yield: 91%
    Catalyst B yield: 84%
    Constraint: prefer the higher-yield catalyst when uncertainty is comparable.
tools:
  read_file:
    enabled: true
allowed_tools:
  - read_file
agents_ref: agents/demo_v0_agents.md
meta_agent:
  name: demo-meta
  system_prompt: |
    You inspect the active role pool in agents.md before DynamicWorkflowPlanner runs.
    Return END with metadata.role_pool_update when reusable roles should change, or
    metadata.no_role_pool_update_reason when the current role pool is already adequate.
  instruction_ref: demo_v0_agent.md
  llm_backend:
    backend_id: fake-meta-llm
  memory_backend:
    backend_id: fake-meta-memory
dynamic_subagents:
  enabled: true
  mode: dynamic
  scope: per_task
  planner_backend:
    backend_id: fake-planner-llm
  default_worker_backend:
    backend_id: fake-llm
  allowed_worker_backend_ids:
    - fake-llm
  allowed_tool_names:
    - read_file
  require_output_schema: false
max_tool_steps: 1
allow_human_tools: false
backends:
  llm:
    fake-meta-llm:
      type: fake
      responses:
        - action:
            action: final_answer
            content: '{"route":"END","instruction":"No task-local generated tool is needed for this deterministic demo.","metadata":{"no_generated_tool_reason":"The built-in read_file tool covers the demo."}}'
        - action:
            action: final_answer
            content: '{"route":"END","instruction":"Role pool already covers the demo catalyst comparison.","metadata":{"no_role_pool_update_reason":"SolverAgent and ReviewerAgent are sufficient for this deterministic demo."}}'
    fake-planner-llm:
      type: fake
      responses:
        - action:
            action: final_answer
            content: '{"workflow_id":"wf-demo-v0","task_summary":"Compare catalyst A and catalyst B using available memory and give a concise recommendation.","article_context_summary":"Catalyst evidence is stored in inputs/catalyst_evidence.txt.","dynamic_subagents":[{"subagent_id":"solver","role_name":"SolverAgent","goal":"Read the catalyst evidence file and make the initial recommendation.","system_prompt":"Read inputs/catalyst_evidence.txt and recommend the higher-yield catalyst with evidence.","input_schema":{"type":"object"},"output_schema":{},"allowed_tools":["read_file"]},{"subagent_id":"reviewer","role_name":"ReviewerAgent","goal":"Review the solver recommendation against the evidence.","system_prompt":"Review the initial catalyst recommendation against the evidence and state whether it is supported.","input_schema":{"type":"object"},"output_schema":{},"allowed_tools":["read_file"]}],"workflow_nodes":[{"node_id":"node-solver","subagent_id":"solver"},{"node_id":"node-reviewer","subagent_id":"reviewer","dependencies":["node-solver"]}],"workflow_edges":[{"source_node_id":"node-solver","target_node_id":"node-reviewer","relation":"depends_on","reason":"The reviewer checks the solver recommendation."}],"artifact_contracts":{},"validation_rules":[],"planner_rationale_summary":"Run a solver then a reviewer from the active role pool."}'
    fake-llm:
      type: fake
      default_content: Catalyst A is the stronger V0 demo recommendation based on the stored evidence.
      responses:
        - action:
            action: tool_call
            tool_call:
              call_id: read-catalyst-evidence
              name: read_file
              arguments:
                path: inputs/catalyst_evidence.txt
        - action:
            action: final_answer
            content: "Catalyst A is stronger: the evidence file reports 91% yield for A versus 84% for B."
        - action:
            action: final_answer
            content: "The recommendation is supported: catalyst A has the higher reported yield under comparable uncertainty."
  memory:
    fake-task-memory:
      type: fake
    fake-meta-memory:
      type: fake
  skill:
    fake-skill:
      type: fake
      skills:
        - skill_id: compare-catalysts
          name: Compare catalyst evidence
          content: Compare candidates by yield, uncertainty, and stated constraints. Read the evidence file before making the initial recommendation.
          required_tools:
            - read_file
evolution:
  backends:
    fake-llm:
      type: fake_agent0
      scenario: promoted_candidate
